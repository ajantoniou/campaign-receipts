<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Concept: Sealed Envelope</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: serif; background: #f0e8d8; }
        .hero {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #d4af8f 0%, #b8956a 50%, #8b7355 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Aged paper texture */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
            pointer-events: none;
        }

        /* Desk surface */
        .desk {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(180deg, #6b5344 0%, #4a3d31 100%);
            box-shadow: inset 0 10px 30px rgba(0,0,0,.4);
        }

        /* Envelope */
        .envelope {
            position: absolute;
            width: 450px;
            height: 320px;
            background: #d4c4b0;
            border: 2px solid #8b7355;
            box-shadow: 0 20px 60px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.3);
            z-index: 10;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Envelope flap */
        .envelope::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(135deg, #d4c4b0, #b8a894);
            border-top: 2px solid #8b7355;
            clip-path: polygon(0 100%, 0 0, 50% 50%, 100% 0, 100% 100%);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,.1);
        }

        /* Wax seal */
        .wax-seal {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #e63946, #a4161a);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,.3), inset -5px -5px 10px rgba(0,0,0,.2);
            z-index: 20;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: rgba(0,0,0,.1);
            font-size: 60px;
        }

        /* Envelope label */
        .envelope-label {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #3a3a3a;
            text-align: center;
            letter-spacing: 2px;
            line-height: 1.4;
        }

        /* Redacted document in background */
        .redacted-doc {
            position: absolute;
            opacity: 0.6;
            z-index: 5;
        }

        .redacted-doc-1 {
            left: 80px;
            top: 200px;
            width: 300px;
            height: 400px;
            background: #e8dcc8;
            border: 1px solid #8b7355;
            padding: 30px;
            box-shadow: -5px 5px 15px rgba(0,0,0,.2);
            transform: rotate(-15deg);
        }

        .redacted-doc-2 {
            right: 100px;
            top: 300px;
            width: 280px;
            height: 350px;
            background: #f0e8d8;
            border: 1px solid #8b7355;
            padding: 25px;
            box-shadow: 5px 5px 15px rgba(0,0,0,.2);
            transform: rotate(8deg);
        }

        .redaction-bar {
            height: 8px;
            background: #000;
            margin: 12px 0;
            opacity: 0.7;
        }

        .redaction-text {
            color: #6b7280;
            font-size: 11px;
            line-height: 1.8;
            margin-bottom: 8px;
        }

        /* Desk lamp */
        .lamp {
            position: absolute;
            right: 200px;
            bottom: 35%;
            width: 2px;
            height: 200px;
            background: #2a2a2a;
            z-index: 3;
            transform-origin: bottom right;
        }

        .lamp-shade {
            position: absolute;
            width: 180px;
            height: 100px;
            background: radial-gradient(ellipse 100% 50% at center top, rgba(255,255,200,.4), rgba(255,255,100,.1));
            right: 195px;
            bottom: 235px;
            border-radius: 50%;
            filter: blur(30px);
            z-index: 2;
        }

        /* Stamp */
        .stamp {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #666;
            right: 80px;
            bottom: 60px;
            z-index: 8;
            transform: rotate(-25deg);
            background: linear-gradient(45deg, transparent 48%, #666 48%, #666 52%, transparent 52%),
                        linear-gradient(-45deg, transparent 48%, #666 48%, #666 52%, transparent 52%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="lamp"></div>
        <div class="lamp-shade"></div>

        <div class="redacted-doc redacted-doc-1">
            <div class="redaction-text">CONFIDENTIAL MEMO</div>
            <div class="redaction-bar"></div>
            <div class="redaction-bar"></div>
            <div class="redaction-text">Date: 2016</div>
            <div class="redaction-bar"></div>
            <div class="redaction-text">Subject:</div>
            <div class="redaction-bar"></div>
            <div class="redaction-bar"></div>
            <div class="redaction-text">Policy Vision</div>
            <div class="redaction-bar"></div>
        </div>

        <div class="redacted-doc redacted-doc-2">
            <div class="redaction-text">ARCHIVE RECORD</div>
            <div class="redaction-bar"></div>
            <div class="redaction-text">2016 Campaign</div>
            <div class="redaction-bar"></div>
            <div class="redaction-bar"></div>
            <div class="redaction-bar"></div>
            <div class="redaction-text">Original Vision</div>
            <div class="redaction-bar"></div>
        </div>

        <div class="desk"></div>

        <div class="stamp">★ OFFICIAL ★</div>

        <div class="envelope">
            <div class="envelope-label">
                SEALED<br>
                2016<br>
                ARCHIVE
            </div>
            <div class="wax-seal">★</div>
        </div>
    </div>
</body>
</html>
