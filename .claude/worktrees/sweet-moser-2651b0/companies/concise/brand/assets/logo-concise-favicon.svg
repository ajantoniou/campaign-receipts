<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!--
    Concise Favicon — Simplified wordmark for 32x32, 16x16, favicon use
    Typeface: Inter Bold
    Color: Navy #1a2a4d on white
    Accent: Electric cyan #00d9ff underline
  -->

  <!-- White background -->
  <rect width="256" height="256" fill="white"/>

  <!-- Navy text: CONCISE (simplified for favicon) -->
  <text
    x="128"
    y="155"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="140"
    font-weight="700"
    fill="#1a2a4d"
    text-anchor="middle"
    letter-spacing="-2.8"
    dominant-baseline="middle"
  >CONCISE</text>

  <!-- Cyan accent underline -->
  <line
    x1="95"
    y1="175"
    x2="165"
    y2="175"
    stroke="#00d9ff"
    stroke-width="5"
    stroke-linecap="round"
  />
</svg>
